<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>thinliquid's catppuccin heaven</title>
        <meta name="description" content="the most ultimate site ever!!1!!11!1!" />

        <style>{{ styles }}</style>

        <!-- 100% privacy-first analytics -->
        <script
            async
            defer
            src="https://scripts.simpleanalyticscdn.com/latest.js"
        ></script>
    </head>
    <body>
        <div id="app">
            <div class="banner" style="border-top: 8px solid rgb(137, 180, 250); border-image: linear-gradient(45deg, rgb(137, 180, 250), rgb(116, 199, 236), rgb(137, 220, 235), rgb(166, 227, 161)) 1 / 1 / 0 stretch; height: 200px; width: calc(100% + 32px); display: flex; align-items: center; justify-content: center; top: 0px; margin-left: -16px; margin-top: -16px; margin-bottom: 16px; z-index: 6969696;"></div>
            {{ site }}
        </div>
        <script>
            const banners = [
              'lucky_star',
              'minecraft',
              'windows_xp',
              'miku',
              'tux_bsod',
              'cirno',
              'tetris'
            ]
            const randomBanner = banners[Math.floor(Math.random() * banners.length)];

            const preload = new Image();
            preload.src = `/banners/${randomBanner}.webp`;
            preload.onload = () => {
              Object.assign(document.querySelector('.banner').style, {
                  background: `linear-gradient(rgba(30, 30, 46, 0.565), rgb(30, 30, 46)) center 50% / cover, url(/banners/${randomBanner}.webp) no-repeat center 50% / cover`
              })
            }
        </script>
        <script>{{ scripts }}</script>
        {{ sidebar }}
    </body>
    <svg>
      <filter id="pixelate" x="0" y="0">
        <feFlood x="4" y="4" height="0.25" width="0.25"/>
        <feComposite width="1.25" height="1.25"/>
        <feTile result="a"/>
        <feComposite in="SourceGraphic" in2="a" operator="in"/>
        <feMorphology operator="dilate" radius="0.625"/>
      </filter>
    </svg>
</html>
