<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>thinliquid's catppuccin heaven</title>

        <style>{{ styles }}</style>

        <!-- 100% privacy-first analytics -->
        <script
            async
            defer
            src="https://scripts.simpleanalyticscdn.com/latest.js"
        ></script>
    </head>
    <body>
        <div id="app">
            <div class="banner"></div>
            {{ site }}
        </div>
        <script>
          const banners = [
            'lucky_star.png',
            'minecraft.png',
            'windows_xp.png',
            'miku.png',
            'tux_bsod.png',
            'cirno.png',
            'tetris.png'
          ]

          Object.assign(document.querySelector('.banner').style, {
                  borderTop: '8px solid #89b4fa',
                  borderImage: 'linear-gradient(45deg, #89b4fa, #74c7ec, #89dceb, #a6e3a1) 1',
                  background: `linear-gradient(to bottom, #1e1e2e90, #1e1e2e), url(/banners/${banners[Math.floor(Math.random() * banners.length)]}) no-repeat`,
                  backgroundSize: 'cover',
                  backgroundPosition: 'center 50%',
                  height: '200px',
                  width: 'calc(100% + 32px)',
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  top: '0',
                  marginLeft: '-16px',
                  marginTop: '-16px',
                  marginBottom: '16px',
                  zIndex: '6969696'
                })
        </script>
        <script>{{ scripts }}</script>
        <script type="module">
        const loadStyle = (url) => {
          Kitty.create('link')
            .attr('rel', 'stylesheet')
            .attr('href', url)
            .to(document.head)
        }

        const loadScript = (url, onload) => {
          Kitty.create('script')
            .attr('defer', '')
            .attr('src', url)
            .on('load', () => {
              setTimeout(onload, 1000)
            })
            .to(document.head)
        }

        loadStyle('https://webring.nekoweb.org/onionring.css')

        const toggleSidebar = Button.render()
          .text('<- close')
          .class('toggle-sidebar')
          .on('click', (e) => {
            document.querySelector('.sidebar')?.classList.toggle('open')
            if (document.querySelector('.sidebar')?.classList.contains('open') === true) {
              e.target.innerText = '<- close'
            } else {
              e.target.innerText = '-> open'
            }
          })
          .to(document.body)

        Div.render()
          .class('sidebar')
          .class('open')
          .append(
            Kitty.create('h2')
              .text('thinliquid\'s catppuccin heaven v2'),
            Kitty.create('small')
              .text('the most ultimate site ever!!1!!11!1!'),
            Kitty.create('small')
              .style({ display: 'block', marginTop: '10px' })
              .html(`~> <a href="https://github.com/ThinLiquid/site/commit/${window.env.COMMIT_HASH}">${(window.env.COMMIT_HASH).slice(0, 7)}</a> (${window.env.COMMIT_DATE})`),
            Break.render(),

            Kitty.create('h3')
              .text('follow me!'),
            Anchor.render({ href: 'https://nekoweb.org/follow/thnlqd' })
              .class('btn')
              .style({ textAlign: 'center' })
              .text('click me, click me!'),

            Kitty.create('h3')
              .text('navigation'),
            Anchor.render({ href: '/' })
              .class('btn')
              .text('home'),
            Anchor.render({ href: '/buttons-galore' })
              .class('btn')
              .text('buttons galore'),
            Anchor.render({ href: 'https://thnlqd.atabook.org' })
              .class('btn')
              .text('guestbook'),

            Kitty.create('h3')
              .text('listen 2 music!'),
            Kitty.create('div')
              .attr('id', 'player'),

            Kitty.create('h3')
              .text('webrings'),
            Kitty.create('webring-container')
              .attr('id', 'nekowebring')
              .append(
                Kitty.create('script')
                  .attr('src', 'https://webring.nekoweb.org/onionring-variables.js'),
                Kitty.create('script')
                  .attr('data-nekowebring-widget', '')
                  .attr('src', 'https://webring.nekoweb.org/onionring-widget.js')
                  .attr('color', 'blue')
              ),
            Kitty.create('webring-container')
              .append(
                Kitty.create('config').attr('key', 'type').attr('value', 'catppuccin'),
                Kitty.create('config').attr('key', 'font').attr('value', '\'IosevkaTerm\', JetBrains Mono, Menlo, monospace'),
                Kitty.create('config').attr('key', 'fill').attr('value', 'true'),
                Kitty.create('script')
                  .attr('src', 'https://palette.nekoweb.org/webring.js')
              ),

            Div.render()
              .style({ flex: '1' }),
            Paragraph.render()
              .style({ textAlign: 'center' })
              .text('(c) 2024 ThinLiquid, all rights reserved.')
          )
          .to(document.body)

        loadScript('https://youtube.com/iframe_api', () => {
          console.log('youtube api loaded')

          const player = new YT.Player('player', {
            width: '100%',
            height: '175',
            events: {
              onReady: () => {
                player.cuePlaylist({
                  listType: 'playlist',
                  list: 'PL-16WUz-giDvrLJDNEw8Zcq9QGTmeQgAM'
                })
              },
              onStateChange: (event) => {
                if (event.data === -1) {
                  player.setShuffle(true)
                }
              }
            }
          })
        })
        </script>
    </body>
</html>
